# Dependabot keeps dependencies patched (security + version updates).
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bundle minor/patch bumps into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in workflows (if any are added later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
